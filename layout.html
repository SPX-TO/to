<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Layout Esteira</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/esteira.css">

</head>

<body>

<div class="container">

  <!-- FAN-OUTS DO TURNO -->
  <div class="fanouts">

    <h3>Fan-outs do turno</h3>

    <input type="text" id="fanoutInput" placeholder="Digite fan-out">

    <div id="listaFanouts"></div>

  </div>

  <!-- AREA DA ESTEIRA -->
<div class="esteira-area">

  <div class="controle-mesas">
    <button id="btnAddMesa">+ Mesa</button>
  </div>

  <div class="coluna" id="mesasEsquerda"></div>

  <div class="esteira">
    <div class="seta">↓</div>
    <div class="seta">↓</div>
    <div class="seta">↓</div>
    <div class="seta">↓</div>
    <div class="seta">↓</div>
  </div>

  <div class="coluna" id="mesasDireita"></div>

</div>

</div>

</body>
</html>
