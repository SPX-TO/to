<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TO Shopee</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Seu CSS -->
<link rel="stylesheet" href="css/style.css" />
</head>

<body>

<div id="updateBanner" class="update-banner">
  🚀 Nova versão do sistema.
  Atualize seu favorito para esta página.
  <button id="closeBanner">OK</button>
</div>

<!-- NAVBAR -->
<nav id="mainNavbar" class="navbar navbar-expand-lg" style="display:none;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">TO Shopee</a>

    <button 
      class="navbar-toggler" 
      type="button" 
      data-bs-toggle="collapse" 
      data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto" id="navMenu"></ul>
    </div>
  </div>
</nav>

<!-- LINK LOGIN -->
<a href="login.html" id="loginLink" class="login-link">Login</a>

<div class="admin-container">

<div class="admin-card">
<h2>Buscar TO</h2>

<input 
type="text" 
id="searchInput"
class="admin-search-input"
placeholder="Digite cidade, código ou estado..."
/>
</div>

<br>

<div class="admin-card" id="resultadoCard" style="display:none;">
<h3>Resultado da busca</h3>
<div id="results"></div>
</div>

<div style="margin-top:20px; text-align:center; font-size:14px; color:#666;">
Versão do banco: 2026.03.07
</div>

<div style="text-align:center; margin-top:8px;">
Encontrou algum problema ou tem uma sugestão?
</div>

<div style="text-align:center; margin-top:8px;">
<button id="abrirFeedback">Enviar feedback</button>
</div>

</div>


<!-- MODAL FEEDBACK -->

<div id="modalFeedback" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">

<div style="background:white; padding:20px; border-radius:8px; width:320px;">

<h3>Enviar feedback</h3>

<input id="fbNome" type="text" placeholder="Nome (opcional)" style="width:100%; margin-bottom:8px; padding:6px;">

<input id="fbWhatsapp" type="text" placeholder="WhatsApp (opcional)" style="width:100%; margin-bottom:8px; padding:6px;">

<input id="fbEmail" type="text" placeholder="Email (opcional)" style="width:100%; margin-bottom:8px; padding:6px;">

<textarea id="fbMensagem" placeholder="Mensagem" style="width:100%; height:80px; margin-bottom:10px; padding:6px;"></textarea>

<button id="enviarFeedback">Enviar</button>
<button id="fecharFeedback">Cancelar</button>

<div id="fbObrigado" style="display:none; margin-top:10px; color:green;">
Obrigado pelo seu feedback!
</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

</body>
</html>
